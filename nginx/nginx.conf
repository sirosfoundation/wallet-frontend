server {
    listen 80;

    include /etc/nginx/conf.d/security-headers*.conf;

    root /usr/share/nginx/html;
    index index.html;

    # Strip /id/<tenant>/ prefix for asset files so relative paths work
    # when the SPA is accessed via nested tenant URLs
    location ~ ^/id/[^/]+/(assets/.*) {
        try_files /$1 =404;
    }

    location ~ ^/id/[^/]+/(.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map|json|webmanifest))$ {
        try_files /$1 =404;
    }

    # SPA fallback for all other routes
    location / {
        try_files $uri /index.html;
    }
}
