name: translation-check

on:
  pull_request:
    branches-ignore:
      - 'tmp**'

permissions:
  contents: write

jobs:
  check-translations:
    name: Check translation coverage

    runs-on: ubuntu-22.04

    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run translation check
        run: npm run translations

      - name: Commit changes if any
        run: |
          # Stage changes from translation coverage
          git add translation_coverage/*.json

          # Check if there are changes
          if ! git diff --cached --exit-code; then
            echo "::warning::Translation coverage badges need updating. These will be auto-committed when merged."
            # Show the changes for reference
            git diff --cached --stat
          else
            echo "No translation coverage changes detected."
          fi
